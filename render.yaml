services:
  - type: web
    name: voting-app-backend
    runtime: node
    repo: https://github.com/dhakalsameer/voting-app-deployment
    branch: main
    rootDir: backend
    buildCommand: npm ci
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "5000"
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: voting-db
          property: connectionString
      - key: RPC_URL
        sync: false
      - key: CONTRACT_ADDRESS_V3
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://voting-app-frontend.vercel.app
      - key: BACKEND_PUBLIC_URL
        fromService:
          type: web
          name: voting-app-backend
          property: host
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: voting-db
    databaseName: election
    user: election_admin
    plan: free
    ipAllowList: []
