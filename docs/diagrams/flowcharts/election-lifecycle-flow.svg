<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.15"/>
    </filter>
  </defs>

  <text x="500" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">Election Lifecycle Flow</text>

  <!-- ============ COLUMN 1: SETUP + REGISTRATION (x=180) ============ -->
  <circle cx="180" cy="65" r="20" fill="#4CAF50" stroke="#388E3C" stroke-width="2" filter="url(#sh)"/>
  <text x="180" y="70" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Start</text>

  <line x1="180" y1="85" x2="180" y2="103" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="120" y="105" width="120" height="36" rx="6" fill="#1565c0" filter="url(#sh)"/>
  <text x="180" y="120" text-anchor="middle" font-size="9" font-weight="bold" fill="white">Deploy Contract</text>
  <text x="180" y="133" text-anchor="middle" font-size="8" fill="#b3d4fc">Election3.sol</text>

  <line x1="180" y1="141" x2="180" y2="159" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="140" y="161" width="80" height="26" rx="13" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="180" y="178" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Created</text>

  <line x1="180" y1="187" x2="180" y2="205" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="140" y="207" width="80" height="26" rx="13" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="180" y="224" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">Registration</text>

  <line x1="180" y1="233" x2="180" y2="248" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="115" y="250" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="180" y="265" text-anchor="middle" font-size="9" fill="#333">Students Register</text>
  <text x="180" y="277" text-anchor="middle" font-size="8" fill="#888">with codes</text>

  <line x1="180" y1="286" x2="180" y2="301" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="115" y="303" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="180" y="318" text-anchor="middle" font-size="9" fill="#333">Admin Verifies</text>
  <text x="180" y="330" text-anchor="middle" font-size="8" fill="#888">wallet linking</text>

  <line x1="180" y1="339" x2="180" y2="354" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="115" y="356" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#67c23a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="180" y="371" text-anchor="middle" font-size="9" fill="#333">Merkle Rebuild</text>
  <text x="180" y="383" text-anchor="middle" font-size="8" fill="#888">on-chain root</text>

  <line x1="180" y1="392" x2="180" y2="407" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="115" y="409" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="180" y="424" text-anchor="middle" font-size="9" fill="#333">Candidates Reg</text>
  <text x="180" y="436" text-anchor="middle" font-size="8" fill="#888">self-register</text>

  <line x1="180" y1="445" x2="180" y2="460" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="180,463 240,495 180,527 120,495" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5" filter="url(#sh)"/>
  <text x="180" y="493" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Deadline</text>
  <text x="180" y="505" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Reached?</text>
  <!-- No loop back: left, up, right into Students Register -->
  <polyline points="120,495 75,495 75,268 115,268" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="80" y="492" text-anchor="end" font-size="8" font-weight="bold" fill="#999">No</text>
  <polygon points="115,268 107,264 107,272" fill="#999"/>

  <line x1="180" y1="527" x2="180" y2="545" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="125" y="547" width="110" height="32" rx="6" fill="#FF9800" filter="url(#sh)"/>
  <text x="180" y="567" text-anchor="middle" font-size="9" font-weight="bold" fill="white">startVoting()</text>

  <!-- Connector Col1 -> Col2: go right, up, right -->
  <line x1="235" y1="563" x2="280" y2="563" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="280" y1="563" x2="280" y2="178" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="280" y1="178" x2="380" y2="178" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="6,3"/>

  <!-- ============ COLUMN 2: VOTING (x=420) ============ -->
  <rect x="380" y="165" width="80" height="26" rx="13" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="420" y="182" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">Voting</text>

  <line x1="420" y1="191" x2="420" y2="206" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="355" y="208" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="420" y="223" text-anchor="middle" font-size="9" fill="#333">Connect Wallet</text>
  <text x="420" y="235" text-anchor="middle" font-size="8" fill="#888">MetaMask auto-restore</text>

  <line x1="420" y1="244" x2="420" y2="259" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="355" y="261" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="420" y="276" text-anchor="middle" font-size="9" fill="#333">Merkle Proof</text>
  <text x="420" y="288" text-anchor="middle" font-size="8" fill="#888">eligibility check</text>

  <line x1="420" y1="297" x2="420" y2="312" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="355" y="314" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#1565c0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="420" y="329" text-anchor="middle" font-size="9" fill="#333">castVote Tx</text>
  <text x="420" y="341" text-anchor="middle" font-size="8" fill="#888">to Sepolia</text>

  <line x1="420" y1="350" x2="420" y2="365" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="355" y="367" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#67c23a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="420" y="382" text-anchor="middle" font-size="9" fill="#333">Verify + Sync</text>
  <text x="420" y="394" text-anchor="middle" font-size="8" fill="#888">DB updated</text>

  <line x1="420" y1="403" x2="420" y2="418" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="420,421 480,453 420,485 360,453" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5" filter="url(#sh)"/>
  <text x="420" y="451" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Deadline</text>
  <text x="420" y="463" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Reached?</text>
  <!-- No loop back: left, up, right into Connect Wallet -->
  <polyline points="360,453 315,453 315,226 355,226" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="320" y="450" text-anchor="end" font-size="8" font-weight="bold" fill="#999">No</text>
  <polygon points="355,226 347,222 347,230" fill="#999"/>

  <line x1="420" y1="485" x2="420" y2="503" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="365" y="505" width="110" height="32" rx="6" fill="#FF9800" filter="url(#sh)"/>
  <text x="420" y="525" text-anchor="middle" font-size="9" font-weight="bold" fill="white">endElection()</text>

  <!-- Connector Col2 -> Col3: go right, up, right -->
  <line x1="475" y1="521" x2="520" y2="521" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="520" y1="521" x2="520" y2="178" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="520" y1="178" x2="620" y2="178" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="6,3"/>

  <!-- ============ COLUMN 3: END (x=660) ============ -->
  <rect x="620" y="165" width="80" height="26" rx="13" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="660" y="182" text-anchor="middle" font-size="9" font-weight="bold" fill="#c62828">Ended</text>

  <line x1="660" y1="191" x2="660" y2="206" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="595" y="208" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="660" y="223" text-anchor="middle" font-size="9" fill="#333">Winner Selection</text>
  <text x="660" y="235" text-anchor="middle" font-size="8" fill="#888">auto-computed</text>

  <line x1="660" y1="244" x2="660" y2="259" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="595" y="261" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="660" y="276" text-anchor="middle" font-size="9" fill="#333">Results Finalized</text>
  <text x="660" y="288" text-anchor="middle" font-size="8" fill="#888">dashboard display</text>

  <line x1="660" y1="297" x2="660" y2="312" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="595" y="314" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="660" y="329" text-anchor="middle" font-size="9" fill="#333">Election Archived</text>
  <text x="660" y="341" text-anchor="middle" font-size="8" fill="#888">history saved</text>

  <line x1="660" y1="350" x2="660" y2="365" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="660,368 720,400 660,432 600,400" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5" filter="url(#sh)"/>
  <text x="660" y="398" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">New</text>
  <text x="660" y="410" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Election?</text>

  <line x1="720" y1="400" x2="755" y2="400" stroke="#999" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="738" y="394" text-anchor="middle" font-size="8" font-weight="bold" fill="#999">Yes</text>
  <circle cx="790" cy="400" r="18" fill="#4CAF50" stroke="#388E3C" stroke-width="2" filter="url(#sh)"/>
  <text x="790" y="405" text-anchor="middle" font-size="9" font-weight="bold" fill="white">Cycle</text>

  <line x1="600" y1="400" x2="565" y2="400" stroke="#999" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="582" y="394" text-anchor="middle" font-size="8" font-weight="bold" fill="#999">No</text>
  <circle cx="530" cy="400" r="18" fill="#f44336" stroke="#d32f2f" stroke-width="2" filter="url(#sh)"/>
  <text x="530" y="405" text-anchor="middle" font-size="9" font-weight="bold" fill="white">End</text>

  <!-- ============ LEGEND ============ -->
  <rect x="50" y="580" width="900" height="38" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="65" y="593" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="85" y="605" font-size="9" fill="#555">Trigger</text>
  <rect x="145" y="593" width="14" height="14" rx="3" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
  <text x="165" y="605" font-size="9" fill="#555">Activity</text>
  <polygon points="245,600 255,593 265,600 255,607" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="275" y="605" font-size="9" fill="#555">Decision</text>
  <rect x="345" y="593" width="14" height="14" rx="7" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,1"/>
  <text x="365" y="605" font-size="9" fill="#555">Phase</text>
  <rect x="415" y="593" width="14" height="14" rx="3" fill="#1565c0"/>
  <text x="435" y="605" font-size="9" fill="#555">Contract</text>
  <rect x="500" y="593" width="14" height="14" rx="3" fill="#f5f5f5" stroke="#67c23a" stroke-width="1"/>
  <text x="520" y="605" font-size="9" fill="#555">Merkle</text>
  <circle cx="590" cy="600" r="7" fill="#4CAF50"/>
  <text x="603" y="605" font-size="9" fill="#555">Start/Cycle</text>
  <circle cx="685" cy="600" r="7" fill="#f44336"/>
  <text x="698" y="605" font-size="9" fill="#555">Finish</text>
  <line x1="770" y1="600" x2="800" y2="600" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="810" y="605" font-size="9" fill="#555">Cross-phase</text>
</svg>
